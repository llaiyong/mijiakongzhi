services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mijiakongzhi-app
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./data/config.json:/app/config.json
      - ./data/spec_cache:/app/data/spec_cache
      - ./data/mijia_auth:/home/appuser/.config/mijia-api
    networks:
      - mijiakongzhi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/cloud/login-status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: mijiakongzhi-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/www:/var/www/certbot:rw
      - ./data/certbot/conf:/etc/letsencrypt:rw
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mijiakongzhi-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    container_name: mijiakongzhi-certbot
    volumes:
      - ./data/certbot/www:/var/www/certbot:rw
      - ./data/certbot/conf:/etc/letsencrypt:rw
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL:-your@email.com} --agree-tos --no-eff-email -d ${DOMAIN:-your-domain.example.com}
    profiles:
      - certbot

  # Tailscale - 取消注释以启用本地设备访问（云端 ECS 连接家庭局域网）
