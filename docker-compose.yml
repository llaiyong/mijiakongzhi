  #   environment:
  #     - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
  #     - TS_STATE_DIR=/var/lib/tailscale
  #     - TS_USERSPACE=false
  #   volumes:
  #     - ./data/tailscale_state:/var/lib/tailscale
