<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>米家控制</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <h1>MIJIA CONTROL</h1>
            </div>
            <div class="header-right">
                <span id="userIdDisplay" class="user-id" style="display:none;"></span>
                <button class="btn btn-icon" id="logoutBtn" title="退出登录" style="display:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
                <button class="btn btn-icon" id="refreshBtn" title="刷新" style="display:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
            </div>
        </header>

        <nav class="sidebar" id="sidebar" style="display:none;">
            <ul class="nav-list">
                <li class="nav-item active" data-page="devices">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>设备列表</span>
                </li>
                <li class="nav-item" data-page="add">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                    <span>添加设备</span>
                </li>
                <li class="nav-item" data-page="settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>设置</span>
                </li>
            </ul>
        </nav>

        <main class="content">
            <!-- 未登录时显示页面 -->
            <div id="page-login" class="page active">
                <div class="login-page">
                    <div class="login-card">
                        <div class="login-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
                        </div>
                        <h2>登录小米账号</h2>
                        <p class="login-desc">请先登录以查看和控制您的米家设备</p>
                        <div id="qrCodeContainer" class="qr-container">
                            <div class="qr-placeholder">
                                <button class="btn btn-primary btn-lg" id="generateQrBtn">生成登录二维码</button>
                            </div>
                        </div>
                        <div id="qrStatus" class="qr-status">等待生成二维码</div>
                    </div>
                </div>
            </div>

            <div id="page-devices" class="page">
                <h2>设备列表</h2>
                <div class="home-selector" id="homeSelector">
                    <button class="home-pill active" data-home="">全部</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="搜索设备名称或型号...">
                </div>
                <div id="deviceGrid" class="device-grid">
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                        <p>暂无设备</p>
                        <p class="hint">添加本地设备或登录云端以获取设备列表</p>
                    </div>
                </div>
            </div>

            <div id="page-add" class="page">
                <h2>添加本地设备</h2>
                <form id="addDeviceForm" class="form">
                    <div class="form-group">
                        <label for="addName">设备名称</label>
                        <input type="text" id="addName" placeholder="例如：客厅灯" required>
                    </div>
                    <div class="form-group">
                        <label for="addIp">IP 地址</label>
                        <input type="text" id="addIp" placeholder="例如：192.168.1.100" required>
                    </div>
                    <div class="form-group">
                        <label for="addToken">Token</label>
                        <input type="text" id="addToken" placeholder="32位十六进制token" required maxlength="32">
                    </div>
                    <div class="form-group">
                        <label for="addModel">型号（可选）</label>
                        <input type="text" id="addModel" placeholder="例如：yeelight.light.lamp1">
                    </div>
                    <button type="submit" class="btn btn-primary">添加设备</button>
                </form>
                <div id="addResult" class="result-msg"></div>
            </div>

            <div id="page-settings" class="page">
                <h2>设置</h2>
                <form id="settingsForm" class="form">
                    <div class="form-group">
                        <label for="defaultControlMode">默认控制模式</label>
                        <select id="defaultControlMode">
                            <option value="local">本地控制</option>
                            <option value="cloud">云端控制</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="corsOrigins">CORS 允许来源（逗号分隔）</label>
                        <input type="text" id="corsOrigins" placeholder="http://localhost,http://127.0.0.1">
                    </div>
                    <button type="submit" class="btn btn-primary">保存设置</button>
                </form>
                <div id="settingsResult" class="result-msg"></div>
            </div>

            <div id="page-detail" class="page">
                <button class="btn btn-back" id="backBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    返回设备列表
                </button>
                <div id="deviceDetail"></div>
                <div id="controlPanel" class="control-panel"></div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 侧滑快捷面板 -->
    <div class="quick-panel-overlay" id="quickPanelOverlay"></div>
    <div class="quick-panel" id="quickPanel">
        <div class="quick-panel-header">
            <div class="quick-panel-title" id="quickPanelTitle">设备控制</div>
            <button class="quick-panel-close" id="quickPanelClose" title="关闭">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="quick-panel-body" id="quickPanelBody">
            <div class="quick-panel-loading">加载中...</div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/device-card.js"></script>
    <script src="/static/js/control-panel.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
